<!DOCTYPE html>
<html>
<head>
  <title>For You ✨</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #0b0c2a, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      position: absolute;
      top: 35%;
      width: 100%;
      font-size: 28px;
    }

    button {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 20px;
      background: #ffffff;
      color: black;
      cursor: pointer;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<h1>✨ Not a great gift but made with effort ✨</h1>

<button onclick="goNext()">Let's go ✨</button>

<canvas id="stars"></canvas>

<script>
function goNext() {
  window.location.href = "message.html";
}

// stars
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5,
    s: Math.random() * 0.5
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    star.y += star.s;
    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
